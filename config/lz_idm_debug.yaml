output_classes: 17
idm_fps: 4

# Data
idm_batch_size: 2
idm_image_size: [128, 128]
idm_dataset_dir: .cache/lz/debug_rnd_policy
idm_validation_dir: .cache/lz/debug_rnd_policy
s3_bucket: b4schnei

# Training
idm_epochs: 1
idm_lr: 5.0e-5
idm_weight_decay: 0
