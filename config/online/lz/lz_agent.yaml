output_dir: ".cache/pokeagent/online"
num_train_epochs: 3
num_objectives: 10
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
save_strategy: "no"
learning_rate: 5.0e-5
weight_decay: 0.00001
adam_beta2: 0.95
warmup_ratio: 0.05
lr_scheduler_type: "linear"
