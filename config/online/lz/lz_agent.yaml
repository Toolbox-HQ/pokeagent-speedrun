eval_steps: 0.0833333 # 0.0833333 ~= 0.25 * num_train_epochs => eval every ~0.25 epochs
dataloader_num_workers: 8
eval_on_start: true

# inference
inference_architecture: EmbedObjectiveAgent
agent_steps: 1000000000
save_state: .cache/lz/state/0.state
sampling_strategy: temperature
temperature: 1
inference_save_path: .cache/pokeagent/runs
rom_path: .cache/lz/rom/lz_rom.gba
online: True
idm_data_sample_interval: 20
idm_data_sample_steps: 100
bootstrap_interval: 4800
max_objective_interval: 4800
context_length: 64
actions_per_second: 4
agent_fps: 2
match_length: 540
retrieved_videos: 100
train_eval_split: 0.1
dynamic_bootstrap: True

# idm
output_classes: 17
idm_fps: 4
idm_batch_size: 2
idm_image_size: [128, 128]
s3_bucket: b4schnei
idm_epochs: 3
idm_lr: 5.0e-5
idm_weight_decay: 0
idm_max_grad_norm: 1.0
wandb_project: pokeagent
idm_gradient_accumulation_steps: 1
idm_eval_every: 0.25
idm_scheduler: null
idm_output_path: rnd_idm_model.pt
idm_dataloaders_per_device: 4
idm_path: "./checkpoints/lz_idm/8d247ed41a1b05ac082fc5b61f512eed53565195/22000/lz_idm_model.pt"
