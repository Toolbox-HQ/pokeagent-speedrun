architecture: "EmbedObjectiveAgent"
lm_name_or_path: "Qwen/Qwen3-1.7B"
vision_name_or_path: "google/siglip-base-patch16-224"
load_path: ./checkpoints/lz_objective_agent/c37de09855847daf3af6e55d3cd8054662bda437/checkpoint-7690/model.safetensors
