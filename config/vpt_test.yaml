architecture: "vpt"
idm_path: ".cache/pokeagent/rnd_idm_model.pt"
output_dir: ".cache/pokeagent/checkpoints_test"
num_train_epochs: 1
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
max_steps: 50
save_strategy: "steps"
save_steps: 25
save_total_limit: 3
learning_rate: 5.0e-5
weight_decay: 0.00001
adam_beta2: 0.95
warmup_ratio: 0.05
lr_scheduler_type: "linear"
logging_steps: 5
gradient_checkpointing: false
report_to: "wandb"
eval_strategy: "steps"
eval_steps: 25
dataloader_num_workers: 0
data_path: ".cache/pokeagent/intervals_padded.json"
